services:
  - type: web
    name: dronacharya-hub
    runtime: python
    # CRITICAL: Tell Render your code is inside the dronacharya_hub folder
    rootDir: dronacharya_hub
    buildCommand: pip install -r requirements.txt
    # All commands below are now relative to the 'dronacharya_hub' folder
    releaseCommand: python -c "from main import app, db; with app.app_context(): db.create_all()"
    startCommand: gunicorn --timeout 120 --workers 2 --bind 0.0.0.0:$PORT main:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
