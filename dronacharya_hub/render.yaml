services:
  - type: web
    name: dronacharya-hub
    runtime: python
    buildCommand: pip install -r requirements.txt
    # FIX: Use 'main' to avoid naming conflicts with the 'app/' folder
    releaseCommand: python -c "from main import app, db; with app.app_context(): db.create_all()"
    # FIX: Move configuration directly into the command line to avoid missing file errors
    startCommand: gunicorn --timeout 120 --workers 2 --bind 0.0.0.0:$PORT main:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
